      mavenCompilerPluginVersion: 3.12.1
preconditions:
  - org.openrewrite.maven.search.FindDependency:
      groupId: org.hibernate
      artifactId: hibernate-jpamodelgen
---
type: specs.openrewrite.org/v1beta/recipe
