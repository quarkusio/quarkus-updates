name: Build

on:
  push:
    branches:
      - "main"
    paths-ignore:
      - '.gitignore'
      - 'CODEOWNERS'
      - 'LICENSE'
      - '*.md'
      - '*.adoc'
      - '*.txt'
      - '.all-contributorsrc'
      - '.github/project.yml'
  pull_request:
    paths-ignore:
      - '.gitignore'
      - 'CODEOWNERS'
      - 'LICENSE'
      - '*.md'
      - '*.adoc'
      - '*.txt'
      - '.all-contributorsrc'
      - '.github/project.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

env:
  MAVEN_OPTS: -Xmx8g
  GRADLE_OPTS: -Dorg.gradle.jvmargs='-Xmx8g'
  MVNW_REPOURL: https://maven-central.storage-download.googleapis.com/maven2

jobs:
  build:
    name: Build on ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        #        os: [windows-latest, macos-latest, ubuntu-latest]
        os: [ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Prepare git
        run: git config --global core.autocrlf false
        if: startsWith(matrix.os, 'windows')

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Set up JDK 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: 17
          cache: 'maven'

      # Merge the Google mirror profile into ~/.m2/settings.xml so that both the
      # Maven CLI and OpenRewrite's internal Maven resolver (which reads
      # ~/.m2/settings.xml directly) use it. Using -s alone would only affect the
      # CLI, not OpenRewrite's test harness.
      - name: Inject Google mirror into Maven settings
        run: |
          if [ -f ~/.m2/settings.xml ]; then
            yq eval-all -p=xml -o=xml 'select(fileIndex == 0) *+ select(fileIndex == 1)' \
              ~/.m2/settings.xml .github/mvn-settings.xml > ~/.m2/settings-merged.xml
            mv ~/.m2/settings-merged.xml ~/.m2/settings.xml
          else
            mkdir -p ~/.m2
            cp .github/mvn-settings.xml ~/.m2/settings.xml
          fi

      - name: Build with Maven
        run: mvn --batch-mode --no-transfer-progress clean install -Dno-format -Dstyle.color=always

      # Publish build reports
      - name: Prepare build reports archive
        if: always()
        run: |
          7z a -tzip build-reports.zip -r \
              '**/target/*-reports/TEST-*.xml' \
              'target/build-report.json' \
              LICENSE
      - name: Upload build reports
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        if: always()
        with:
          name: "build-reports-${{ github.run_attempt }}-Build on ${{ matrix.os }}"
          path: |
            build-reports.zip
          retention-days: 7
      - name: Produce report and add it as job summary
        uses: quarkusio/action-build-reporter@main
        if: always()
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          build-reports-artifacts-path: .
